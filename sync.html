<!DOCTYPE html>
<html>
<head>
    <title>Ez-Login Sync</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .widget { width: 100%; max-width: 320px; text-align: center; background: #1e1e1e; padding: 25px; border-radius: 15px; border: 1px solid #333; }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; background: #333; color: white; }
        button { width: 95%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        
        /* The "Google Style" header */
        h3 { color: #888; margin-bottom: 5px; font-weight: normal; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
        h2 { margin-top: 0; color: #fff; font-size: 24px; }
        .brand { color: #007bff; font-weight: bold; }
    </style>
</head>
<body>
    <div class="widget">
        <div class="brand">Ez-Login</div>
        <h3 id="statusText">Signing into</h3>
        <h2 id="appTitle">Loading...</h2>
        
        <input type="text" id="u" placeholder="Username">
        <input type="password" id="p" placeholder="Password">
        <button onclick="startSync()">Continue to App</button>
    </div>

    <script src="security.js"></script>
    <script src="auth.js"></script>
    <script>
        // Use URLSearchParams to get the name from the link (?app=Bmail)
        const params = new URLSearchParams(window.location.search);
        const appName = params.get('app') || "Account";
        document.getElementById('appTitle').innerText = appName;

        async function startSync() {
            const u = document.getElementById('u').value;
            const p = document.getElementById('p').value;
            const status = document.getElementById('statusText');

            status.innerText = "Verifying...";
            
            // This function is in your auth.js
            const success = await handleWidgetLogin(u, p, appName);
            
            if (success) {
                status.innerText = "Success! Redirecting...";
                status.style.color = "#28a745";
                
                setTimeout(() => {
                    if (window.opener) {
                        window.close(); // Closes popup
                    } else {
                        // Shows success in iframe
                        document.body.innerHTML = "<div style='text-align:center; padding-top:40%;'><h1>✓ Verified</h1><p>Returning to " + appName + "</p></div>";
                    }
                }, 1000);
            } else {
                alert("Login Failed");
                status.innerText = "Signing into";
            }
        }
    </script>
</body>
</html>
