name: Add Ez-Login User
on:
  workflow_dispatch:
    inputs:
      username:
        description: 'Username'
        required: true
      password:
        description: 'Password'
        required: true

jobs:
  update-db:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Encrypt and Save
        run: |
          node -e "
          const fs = require('fs');
          const crypto = require('crypto');
          const db = JSON.parse(fs.readFileSync('ipp.qqf3', 'utf8'));
          
          const user = '${{ github.event.inputs.username }}';
          const pass = '${{ github.event.inputs.password }}';
          const salt = 'ez-login-salt';
          
          const key = crypto.pbkdf2Sync(pass, salt, 100000, 32, 'sha256');
          const iv = crypto.randomBytes(12);
          const cipher = crypto.createCipheriv('aes-256-gcm', key, iv);
          
          const encrypted = Buffer.concat([cipher.update('verified', 'utf8'), cipher.final()]);
          const tag = cipher.getAuthTag();
          const combined = Buffer.concat([encrypted, tag]);

          db.users[user] = {
            content: combined.toString('base64'),
            iv: iv.toString('base64'),
            pfp: 'https://github.com/' + user + '.png',
            apps: ['Bmail', 'Android Sync']
          };
          fs.writeFileSync('ipp.qqf3', JSON.stringify(db, null, 2));
          "
      - name: Push to Repo
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Ez-Login Bot"
          git add ipp.qqf3
          git commit -m "Added user: ${{ github.event.inputs.username }}"
          git push