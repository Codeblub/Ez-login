<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ez-Login Dashboard</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .box { background: #1e293b; padding: 30px; border-radius: 20px; width: 350px; text-align: center; border: 1px solid #334155; }
        .pfp { width: 80px; height: 80px; border-radius: 50%; border: 3px solid #3b82f6; margin-bottom: 10px; }
        .tag { background: #334155; padding: 5px 12px; border-radius: 15px; font-size: 14px; display: inline-flex; align-items: center; margin: 5px; }
        .remove-btn { margin-left: 8px; color: #ef4444; cursor: pointer; font-weight: bold; }
        .hidden { display: none; }
        button { background: #3b82f6; color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; }
        .bmail-link { background: #1e1e1e; border: 1px solid #007bff; padding: 10px; border-radius: 10px; margin-top: 15px; text-align: left; }
    </style>
</head>
<body>

    <div id="login-box" class="box">
        <h2>Ez-Login</h2>
        <input type="text" id="user" placeholder="Username" style="width:90%; padding:10px; margin:10px 0; border-radius:5px; border:none;">
        <input type="password" id="pass" placeholder="Password" style="width:90%; padding:10px; margin:10px 0; border-radius:5px; border:none;">
        <button id="login-btn" onclick="login()">Sign In</button>
    </div>

    <div id="dash-box" class="box hidden">
        <img id="pfp" class="pfp" src="">
        <h2 id="name">User</h2>
        <p style="color: #94a3b8;">Linked Apps:</p>
        <div id="apps"></div>
        
        <div id="extra-details"></div>

        <button onclick="location.reload()" style="margin-top:20px; background:#475569;">Logout</button>
    </div>

    <script src="security.js"></script>
    <script src="auth.js"></script>
    <script>
        async function login() {
            const user = document.getElementById('user').value;
            const pass = document.getElementById('pass').value;
            const btn = document.getElementById('login-btn');

            btn.innerText = "Verifying...";
            const res = await handleLogin(user, pass);

            if (res.success) {
                document.getElementById('login-box').classList.add('hidden');
                document.getElementById('dash-box').classList.remove('hidden');
                
                document.getElementById('name').innerText = res.username;
                document.getElementById('pfp').src = res.pfp || `https://github.com/${res.username}.png`;

                // 1. Keep your original App Tags logic
                const appContainer = document.getElementById('apps');
                appContainer.innerHTML = "";
                
                if (res.apps && res.apps.length > 0) {
                    res.apps.forEach(app => {
                        const span = document.createElement('span');
                        span.className = 'tag';
                        span.innerHTML = `${app} <span class="remove-btn" title="Unlink" onclick="unlink('${res.username}', '${app}')">×</span>`;
                        appContainer.appendChild(span);
                    });
                } else {
                    appContainer.innerHTML = "<p id='no-apps' style='color:#94a3b8'>No apps linked.</p>";
                }

                // 2. ADDED: Show the specific @bmail.com address chosen
                const savedBmail = localStorage.getItem('ez_login_bmail');
                if (savedBmail) {
                    const extra = document.getElementById('extra-details');
                    extra.innerHTML = `
                        <div class="bmail-link">
                            <small style="color:#3b82f6; text-transform:uppercase;">Bmail Active</small><br>
                            <strong>${savedBmail}</strong>
                        </div>
                    `;
                    // Remove the "No apps linked" text if Bmail is there
                    const noAppsText = document.getElementById('no-apps');
                    if (noAppsText) noAppsText.style.display = 'none';
                }

            } else {
                alert("Login failed!");
                btn.innerText = "Sign In";
            }
        }

        function unlink(username, appName) {
            if (confirm(`Unlink ${appName}?`)) {
                const actionUrl = `https://github.com/Codeblub/Ez-login/actions/workflows/unlink-app.yml`;
                alert(`Redirecting to GitHub Actions to unlink ${appName} for ${username}`);
                window.open(actionUrl, '_blank');
            }
        }
    </script>
</body>
</html>
