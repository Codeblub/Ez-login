<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ez-Login Dashboard</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --primary: #3b82f6; --danger: #ef4444; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: var(--card); padding: 2rem; border-radius: 1rem; box-shadow: 0 10px 25px rgba(0,0,0,0.3); width: 100%; max-width: 400px; text-align: center; }
        input { width: 100%; padding: 0.75rem; margin: 0.5rem 0; border-radius: 0.5rem; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 0.75rem; background: var(--primary); color: white; border: none; border-radius: 0.5rem; cursor: pointer; font-weight: 600; margin-top: 1rem; transition: opacity 0.2s; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .hidden { display: none; }
        .profile-img { width: 80px; height: 80px; border-radius: 50%; margin-bottom: 1rem; border: 3px solid var(--primary); }
        .tag-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 0.5rem; margin-top: 1rem; }
        .tag { background: #334155; padding: 0.4rem 0.8rem; border-radius: 2rem; font-size: 0.85rem; display: flex; align-items: center; transition: background 0.2s; }
        .tag:hover { background: #475569; }
        .remove-btn { margin-left: 8px; color: var(--danger); font-weight: bold; cursor: pointer; font-size: 1.1rem; line-height: 1; }
        .logout { margin-top: 2rem; display: block; color: #94a3b8; text-decoration: none; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="container">
        <div id="login-box">
            <h2 style="margin-top:0">Ez-Login</h2>
            <input type="text" id="u" placeholder="Username">
            <input type="password" id="p" placeholder="Password">
            <button id="login-btn" onclick="login()">Sign In</button>
            <p style="font-size: 0.9rem; color: #94a3b8;">No account? Use GitHub Actions to create one.</p>
        </div>

        <div id="dash-box" class="hidden">
            <img id="pfp" src="" class="profile-img">
            <h2 id="name" style="margin: 0 0 0.5rem 0;"></h2>
            <div class="tag-container" id="apps"></div>
            <a href="#" class="logout" onclick="location.reload()">[Logout]</a>
        </div>
    </div>

    <script src="security.js"></script>
    <script src="auth.js"></script>
    
    <script>
        async function login() {
            const user = document.getElementById('u').value;
            const pass = document.getElementById('p').value;
            const btn = document.getElementById('login-btn');

            if (!user || !pass) return alert("Please enter credentials");

            btn.disabled = true;
            btn.innerText = "Authenticating...";

            const res = await handleLogin(user, pass);

            if (res.success) {
                document.getElementById('login-box').classList.add('hidden');
                document.getElementById('dash-box').classList.remove('hidden');
                
                document.getElementById('name').innerText = res.username;
                document.getElementById('pfp').src = res.pfp || `https://github.com/${res.username}.png`;

                const appContainer = document.getElementById('apps');
                appContainer.innerHTML = "";

                if (res.apps && res.apps.length > 0) {
                    res.apps.forEach(app => {
                        const span = document.createElement('span');
                        span.className = 'tag';
                        span.innerHTML = `
                            ${app}
                            <span class="remove-btn" title="Unlink App" onclick="unlink('${res.username}', '${app}')">×</span>
                        `;
                        appContainer.appendChild(span);
                    });
                } else {
                    appContainer.innerHTML = "<p style='color:#94a3b8'>No apps linked.</p>";
                }
            } else {
                alert("Login failed! Check your username or password.");
                btn.disabled = false;
                btn.innerText = "Sign In";
            }
        }

        function unlink(username, appName) {
            if (confirm(`Are you sure you want to unlink ${appName}?`)) {
                // Since we can't write to GitHub from the browser without a token,
                // we direct the user to the correct GitHub Action.
                const actionUrl = `https://github.com/Codeblub/Ez-login/actions/workflows/unlink-app.yml`;
                alert(`Redirecting to GitHub. Run the 'Unlink App' Action for user '${username}' and app '${appName}'.`);
                window.open(actionUrl, '_blank');
            }
        }
    </script>
</body>
</html>
