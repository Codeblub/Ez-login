<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }
        .login-container {
            background-color: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            width: 300px;
            text-align: center;
        }
        h2 { margin-bottom: 20px; color: #333; }
        input[type="text"], input[type="password"] {
            width: 90%; padding: 10px; margin: 10px 0;
            border: 1px solid #ccc; border-radius: 4px;
        }
        button {
            width: 100%; padding: 10px; background-color: #0056b3;
            color: white; border: none; border-radius: 4px;
            cursor: pointer; font-size: 16px; margin-top: 10px;
        }
        button:hover { background-color: #004494; }
        #message { margin-top: 15px; font-weight: bold; }
        .signup-link { margin-top: 20px; font-size: 14px; }
        .signup-link a { color: #0056b3; text-decoration: none; }
        .signup-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="login-container">
        <h2>Login</h2>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button onclick="attemptLogin()">Login</button>
        <div id="message"></div>
        
        <div class="signup-link">
            Don't have an account? <a href="up.html">Sign Up here</a>
        </div>
    </div>

    <script>
        function attemptLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const messageDiv = document.getElementById('message');

            // 1. Check the hardcoded Admin credentials
            if (user === 'Adminconfig' && pass === 'Burtle@123') {
                messageDiv.style.color = 'green';
                messageDiv.innerText = 'Admin Login successful!';
            } 
            // 2. Check if the user exists in Local Storage (simulated database)
            else if (localStorage.getItem(user) === pass) {
                messageDiv.style.color = 'green';
                messageDiv.innerText = 'User Login successful!';
            } 
            // 3. Fail if neither match
            else {
                messageDiv.style.color = 'red';
                messageDiv.innerText = 'Invalid username or password.';
            }
        }
    </script>

</body>
</html>
