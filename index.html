<!DOCTYPE html>
<html>
<head>
    <title>Ez-Login Dashboard</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; justify-content: center; padding-top: 50px; }
        .card { background: #1e1e1e; padding: 30px; border-radius: 15px; width: 350px; text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; background: #333; color: white; }
        button { width: 95%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .hidden { display: none; }
        .pfp { width: 100px; height: 100px; border-radius: 50%; border: 3px solid #007bff; margin-bottom: 15px; }
        .tag { background: #007bff22; color: #007bff; padding: 5px 12px; border-radius: 20px; font-size: 13px; margin: 5px; display: inline-block; border: 1px solid #007bff; }
    </style>
</head>
<body>
    <div class="card">
        <div id="login-box">
            <h2>Sign In</h2>
            <input type="text" id="u" placeholder="Username">
            <input type="password" id="p" placeholder="Password">
            <button onclick="login()">Login</button>
            <p style="font-size: 14px;">Need an account? <a href="up.html" style="color:#007bff">Sign Up</a></p>
        </div>
        <div id="dash-box" class="hidden">
            <img id="pfp" class="pfp" src="">
            <h2 id="name"></h2>
            <div id="apps"></div>
            <button onclick="location.reload()" style="background:#333; margin-top:20px;">Logout</button>
        </div>
    </div>
    <script src="security.js"></script>
    <script src="auth.js"></script>
    <script>
async function login() {
    const user = document.getElementById('u').value;
    const pass = document.getElementById('p').value;
    const loginBox = document.getElementById('login-box');
    const dashBox = document.getElementById('dash-box');

    // Show a loading state
    document.querySelector('button').innerText = "Authenticating...";

    const res = await handleLogin(user, pass);

    if(res.success) {
        loginBox.classList.add('hidden');
        dashBox.classList.remove('hidden');
        
        document.getElementById('name').innerText = res.username;
        document.getElementById('pfp').src = res.pfp;
        
        // Clear old tags and add new ones from ipp.qqf3
        const appContainer = document.getElementById('apps');
        appContainer.innerHTML = ""; 
        res.apps.forEach(a => {
            const s = document.createElement('span'); 
            s.className = 'tag'; 
            s.innerText = a;
            appContainer.appendChild(s);
        });
    } else { 
        alert("Login Failed: User not found or incorrect password.");
        document.querySelector('button').innerText = "Login";
    }
}
    </script>
</body>
</html>
