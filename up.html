<!DOCTYPE html>
<html>
<head>
    <title>Ez-Login | Sign Up</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; justify-content: center; padding-top: 50px; }
        .card { background: #1e1e1e; padding: 30px; border-radius: 15px; width: 350px; text-align: center; }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; background: #333; color: white; }
        button { width: 95%; padding: 12px; background: #28a745; color: white; border: none; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Register</h2>
        <input type="text" id="nu" placeholder="Username">
        <input type="password" id="np" placeholder="Password">
        <button onclick="signup()">Create Account</button>
        <p><a href="index.html" style="color:#007bff">Back to Login</a></p>
    </div>
    <script src="security.js"></script>
    <script src="auth.js"></script>
    <script>
function signup() {
    const user = document.getElementById('nu').value;
    const pass = document.getElementById('np').value;

    if (!user || !pass) {
        alert("Please fill in both fields.");
        return;
    }

    // This link takes you directly to the 'Run Workflow' UI on GitHub
    const githubActionUrl = "https://github.com/Codeblub/Ez-login/actions/workflows/add-user.yml";
    
    alert(`Redirecting to GitHub to securely create user: ${user}.\n\nPaste the username and password into the 'Run Workflow' box there.`);
    
    window.open(githubActionUrl, '_blank');
}
    </script>
</body>
</html>
